services:
  web:
    container_name: story-runner-web
    build: .
    restart: unless-stopped
    ports:
      - "127.0.0.1:8001:8000"
    environment:
      DEBUG: ${DEBUG:-1}
      SECRET_KEY: ${SECRET_KEY:-dev-only-change-me}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-change-me}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-http://localhost:8001}
      DATABASE_PATH: /app/data/story-runner.sqlite3
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz/', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      default:
      web_proxy:
        aliases:
          - story-runner

networks:
  web_proxy:
    name: zhizhka-web
