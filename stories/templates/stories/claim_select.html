{% extends 'stories/base.html' %}
{% block title %}Выбрать пункты{% endblock %}
{% block content %}
<a class="text-sm text-zinc-500 hover:text-zinc-950" href="{% url 'stories:home' %}">← Назад</a>
<div class="mt-8 border-b border-zinc-200 pb-6">
  <p class="text-sm text-zinc-500">{{ run.get_os_display }} — {{ run.version }} ({{ run.build }})</p>
  <h1 class="mt-2 text-3xl font-semibold tracking-tight">Выберите пункты</h1>
</div>

<form method="post" class="mt-5 overflow-hidden rounded-2xl border border-zinc-200 bg-white shadow-sm">
  {% csrf_token %}
  <div class="border-b border-zinc-200 p-4 sm:p-5">
    <label class="grid max-w-md gap-1.5 text-sm text-zinc-600"><span>Ваше имя</span><input class="h-11 rounded-xl border border-zinc-300 px-3 text-zinc-950 focus:border-zinc-500 focus:ring-2 focus:ring-zinc-200" name="display_name" maxlength="80" value="{% if participant %}{{ participant.display_name }}{% endif %}" required autocomplete="name"></label>
  </div>
  <fieldset class="claim-tree">
    <legend class="sr-only">Разделы и пункты</legend>
    {% for row in rows %}
      <label class="claim-row grid min-h-12 grid-cols-[auto_1fr] items-center gap-x-3 border-t border-zinc-100 px-4 py-2 text-sm transition first:border-t-0 sm:grid-cols-[auto_1fr_auto] {% if row.claimable %}cursor-pointer hover:bg-zinc-50{% else %}cursor-not-allowed opacity-45{% endif %}" style="padding-left: calc(1rem + {{ row.depth }} * 1.25rem)" data-claim-depth="{{ row.depth }}" data-claim-kind="{{ row.node.kind }}">
        <input class="claim-node size-4 rounded border-zinc-300 text-zinc-950 focus:ring-zinc-400" type="checkbox" name="nodes" value="{{ row.node.id }}" {% if not row.claimable %}disabled{% endif %}>
        <span class="grid min-w-0 gap-0.5 text-zinc-800">
          <span><strong class="font-semibold">{{ row.node.code }}</strong> {{ row.node.title }}</span>
          {% if row.visible_note %}<span class="text-xs leading-5 text-amber-700">⚠️ {{ row.visible_note }}</span>{% endif %}
        </span>
        <span class="col-start-2 text-xs text-zinc-400 sm:col-start-auto">
          {% if row.node.kind == 'check' and row.claimed_by %}Взял {{ row.claimed_by }}{% elif row.node.kind == 'check' and row.node.result_status %}Готово{% elif row.node.kind == 'check' and row.was_skipped %}<span class="font-medium text-amber-700">Пропуск</span>{% else %}Свободно {{ row.free }} из {{ row.total }}{% endif %}
        </span>
      </label>
    {% endfor %}
  </fieldset>
  <div class="sticky bottom-0 flex justify-end border-t border-zinc-200 bg-white/95 p-4 backdrop-blur"><button class="min-h-11 rounded-xl bg-zinc-950 px-5 text-sm font-medium text-white hover:bg-zinc-800" type="submit">Начать</button></div>
</form>
{% endblock %}
