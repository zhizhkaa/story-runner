{% extends 'stories/base.html' %}
{% block title %}Вход{% endblock %}
{% block content %}
<section class="mx-auto mt-[10vh] max-w-sm rounded-2xl border border-zinc-200 bg-white p-6 shadow-sm sm:p-8">
  <h1 class="text-2xl font-semibold tracking-tight">Управление</h1>
  <form method="post" class="mt-6 grid gap-4">
    {% csrf_token %}<input type="hidden" name="next" value="{{ next }}">
    <label class="grid gap-1.5 text-sm text-zinc-600"><span>Пароль</span><input class="h-11 rounded-xl border border-zinc-300 px-3 text-zinc-950 focus:border-zinc-500 focus:ring-2 focus:ring-zinc-200" type="password" name="password" required autofocus autocomplete="current-password"></label>
    <button class="h-11 rounded-xl bg-zinc-950 text-sm font-medium text-white hover:bg-zinc-800" type="submit">Войти</button>
  </form>
</section>
{% endblock %}
